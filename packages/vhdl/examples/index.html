<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>@omni-wasm/vhdl — Demo</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 2rem auto; }
    textarea { width: 100%; height: 200px; font-family: monospace; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; overflow-x: auto; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>@omni-wasm/vhdl</h1>
  <p>VHDL execution in the browser. No server.</p>
  <textarea id="code">// Write your VHDL code here</textarea>
  <br><br>
  <button onclick="run()">Run</button>
  <h2>Output</h2>
  <pre id="output">Press "Run" to execute.</pre>
  <script type="module">
    import createRuntime from '../dist/index.js';

    let runtime;

    window.run = async () => {
      const output = document.getElementById('output');
      const code = document.getElementById('code').value;
      try {
        if (!runtime) {
          output.textContent = 'Loading VHDL runtime...';
          runtime = await createRuntime();
        }
        const result = await runtime.execute(code);
        output.textContent = result.stdout + (result.stderr ? '\nSTDERR:\n' + result.stderr : '');
      } catch (e) {
        output.textContent = 'Error: ' + e.message;
      }
    };
  </script>
</body>
</html>
