<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@omni-wasm/c — Browser Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0d1117; color: #c9d1d9; padding: 2rem; max-width: 960px; margin: 0 auto;
    }
    h1 { color: #58a6ff; margin-bottom: 0.5rem; font-size: 1.5rem; }
    .subtitle { color: #8b949e; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .status { padding: 0.5rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.85rem; }
    .status.loading { background: #161b22; border: 1px solid #30363d; }
    .status.ready { background: #0d2818; border: 1px solid #238636; color: #3fb950; }
    .status.error { background: #2d1216; border: 1px solid #da3633; color: #f85149; }
    textarea {
      width: 100%; min-height: 260px; background: #161b22; color: #e6edf3;
      border: 1px solid #30363d; border-radius: 6px; padding: 1rem;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px; line-height: 1.5; resize: vertical; tab-size: 4;
    }
    textarea:focus { outline: none; border-color: #58a6ff; }
    .controls { display: flex; gap: 0.5rem; align-items: center; margin: 1rem 0; }
    button { padding: 0.5rem 1.5rem; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
    button.run { background: #238636; color: #fff; border-color: #238636; }
    button.run:hover { background: #2ea043; }
    button.run:disabled { opacity: 0.5; cursor: not-allowed; }
    button.reset { background: #21262d; color: #c9d1d9; }
    button.reset:hover { background: #30363d; }
    .output-label { font-size: 0.85rem; color: #8b949e; margin-bottom: 0.25rem; }
    .output {
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 1rem;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px; line-height: 1.5; white-space: pre-wrap;
      min-height: 60px; max-height: 300px; overflow-y: auto; margin-bottom: 1rem;
    }
    .output.stdout { color: #e6edf3; }
    .output.stderr { color: #f85149; }
    .meta { font-size: 0.8rem; color: #8b949e; }
  </style>
</head>
<body>
  <h1>@omni-wasm/c</h1>
  <p class="subtitle">C interpreted in the browser via picoc + WebAssembly. No server, no API calls.</p>

  <div id="status" class="status loading">Loading C runtime...</div>

  <textarea id="code" spellcheck="false">#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;

/* Structs */
struct Player {
    char name[32];
    int score;
};

int main() {
    int i;

    printf("=== C running in WebAssembly! ===\n\n");

    /* Array of structs */
    struct Player players[5];
    strcpy(players[0].name, "Alice");   players[0].score = 950;
    strcpy(players[1].name, "Bob");     players[1].score = 1200;
    strcpy(players[2].name, "Charlie"); players[2].score = 800;
    strcpy(players[3].name, "Diana");   players[3].score = 1100;
    strcpy(players[4].name, "Eve");     players[4].score = 1050;

    printf("Leaderboard:\n");
    for (i = 0; i &lt; 5; i++) {
        printf("  %d. %s - %d pts\n", i + 1, players[i].name, players[i].score);
    }

    /* Dynamic memory */
    printf("\nFibonacci (heap-allocated):\n  ");
    int *fib = malloc(20 * sizeof(int));
    fib[0] = 0; fib[1] = 1;
    for (i = 2; i &lt; 20; i++)
        fib[i] = fib[i-1] + fib[i-2];
    for (i = 0; i &lt; 20; i++)
        printf("%d ", fib[i]);
    printf("\n");
    free(fib);

    /* String operations */
    char buf[64];
    sprintf(buf, "Hello from %s v%d!", "picoc", 21);
    printf("\n%s\n", buf);
    printf("String length: %d\n", (int)strlen(buf));

    return 0;
}</textarea>

  <div class="controls">
    <button id="runBtn" class="run" disabled>Run (Ctrl+Enter)</button>
    <button id="resetBtn" class="reset" disabled>Reset</button>
  </div>

  <div class="output-label">stdout:</div>
  <div id="stdout" class="output stdout"></div>
  <div class="output-label">stderr:</div>
  <div id="stderr" class="output stderr"></div>
  <div id="meta" class="meta"></div>

  <script type="module">
    const base = window.location.pathname.includes('/examples')
      ? '../dist/index.js'
      : '/packages/c/dist/index.js';
    const { default: createRuntime } = await import(base);

    const statusEl = document.getElementById('status');
    const codeEl = document.getElementById('code');
    const stdoutEl = document.getElementById('stdout');
    const stderrEl = document.getElementById('stderr');
    const metaEl = document.getElementById('meta');
    const runBtn = document.getElementById('runBtn');
    const resetBtn = document.getElementById('resetBtn');

    let runtime = null;

    async function init() {
      try {
        runtime = await createRuntime({
          onProgress: (p) => { statusEl.textContent = `Loading C runtime... ${p}%`; },
        });
        statusEl.textContent = `Ready — ${runtime.version}`;
        statusEl.className = 'status ready';
        runBtn.disabled = false;
        resetBtn.disabled = false;
      } catch (err) {
        statusEl.textContent = `Failed to load: ${err.message}`;
        statusEl.className = 'status error';
        console.error(err);
      }
    }

    async function run() {
      if (!runtime) return;
      runBtn.disabled = true;
      stdoutEl.textContent = '';
      stderrEl.textContent = '';
      metaEl.textContent = 'Interpreting...';
      try {
        const result = await runtime.execute(codeEl.value);
        stdoutEl.textContent = result.stdout || '(no output)';
        stderrEl.textContent = result.stderr || '(no errors)';
        metaEl.textContent = `Exit code: ${result.exitCode} | Duration: ${result.duration.toFixed(1)}ms`;
      } catch (err) {
        stderrEl.textContent = err.message;
        metaEl.textContent = 'Execution failed';
      }
      runBtn.disabled = false;
    }

    runBtn.addEventListener('click', run);
    resetBtn.addEventListener('click', async () => {
      if (runtime) { await runtime.reset(); stdoutEl.textContent = ''; stderrEl.textContent = ''; metaEl.textContent = 'Runtime reset.'; }
    });
    codeEl.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); run(); }
      if (e.key === 'Tab') { e.preventDefault(); const s = codeEl.selectionStart; codeEl.value = codeEl.value.substring(0, s) + '    ' + codeEl.value.substring(codeEl.selectionEnd); codeEl.selectionStart = codeEl.selectionEnd = s + 4; }
    });

    init();
  </script>
</body>
</html>
