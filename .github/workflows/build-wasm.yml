name: Build WASM

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to build (e.g., "lua", "python", or "all")'
        required: true
        default: 'all'

jobs:
  build:
    name: Build WASM — ${{ github.event.inputs.language }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build WASM binary
        run: ./tools/build.sh ${{ github.event.inputs.language }}

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ github.event.inputs.language }}
          path: packages/*/dist/*.wasm
          retention-days: 30
